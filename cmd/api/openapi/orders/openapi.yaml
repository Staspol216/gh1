openapi: 3.0.2

info:
  title: Orders API
  version: 1.0.0

paths:
  /ping:
    get:
      summary: Health check
      operationId: GetPing
      tags:
        - health
      responses:
        200:
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: pong
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"

  /orders:
    get:
      summary: Retrieve a list of Orders
      operationId: GetOrders
      tags:
        - order
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        200:
          $ref: "#/components/responses/GetOrdersListResponse"
        400:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
    post:
      summary: Accept an order from courier
      operationId: CreateOrder
      tags:
        - order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateRequest"
      responses:
        201:
          $ref: "#/components/responses/CreateOrderResponse"
        400:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
    patch:
      summary: Deliver or refund orders for recipient
      operationId: UpdateOrders
      tags:
        - order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdateRequest"
      responses:
        204:
          description: Order operation completed successfully
        400:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"

  /orders/{orderID}:
    parameters:
      - $ref: "#/components/parameters/orderID"
      - $ref: "#/components/parameters/recipientID"
    get:
      summary: Retrieve order by ID for recipient
      operationId: GetOrder
      tags:
        - order
      responses:
        200:
          $ref: "#/components/responses/GetOrderResponse"
        400:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        404:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
    delete:
      summary: Return order to courier
      operationId: DeleteOrder
      tags:
        - order
      responses:
        204:
          description: Order operation completed successfully
        400:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        404:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"

  /orders/refunds:
    get:
      summary: Retrieve refunded orders
      operationId: GetRefundedOrders
      tags:
        - order
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        200:
          $ref: "#/components/responses/GetOrdersListResponse"
        400:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"

  /orders-history:
    get:
      summary: Retrieve orders history
      operationId: GetOrdersHistory
      tags:
        - order
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        200:
          $ref: "#/components/responses/GetOrdersListResponse"
        400:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"
        default:
          $ref: "../common/common.yaml#/components/responses/ApiErrorResponse"

components:
  parameters:
    orderID:
      name: orderID
      in: path
      required: true
      schema:
        type: integer
        format: int64
    recipientID:
      name: recipientID
      in: query
      required: true
      schema:
        type: integer
        format: int64
    offset:
      name: offset
      in: query
      required: false
      schema:
        type: string
        default: "0"
    limit:
      name: limit
      in: query
      required: false
      schema: {
        type: integer,
        minimum: 1,
        maximum: 100,
        default: 10
      }
  responses:
    GetOrdersListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              orders:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
            required:
              - orders
    GetOrderResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Order"
    CreateOrderResponse:
      description: Created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OrderIDResponse"
  schemas:
    OrderCreateRequest:
      type: object
      properties:
        order:
          $ref: "#/components/schemas/OrderParams"
        packagingType:
          $ref: "#/components/schemas/PackagingType"
        membranaIncluded:
          type: boolean
      required:
        - order
        - packagingType
        - membranaIncluded
    OrderUpdateRequest:
      type: object
      properties:
        order_ids:
          type: array
          items:
            type: integer
            format: int64
        recipient_id:
          type: integer
          format: int64
        action:
          $ref: "#/components/schemas/OrderUpdateAction"
      required:
        - order_ids
        - recipient_id
        - action
    OrderIDResponse:
      type: object
      properties:
        order_id:
          type: integer
          format: int64
      required:
        - order_id
    OrderParams:
      type: object
      properties:
        recipient_id:
          type: integer
          format: int64
        expiration_date:
          type: string
          format: date-time
        weight:
          type: number
          format: double
        worth:
          type: number
          format: double
      required:
        - recipient_id
        - expiration_date
        - weight
        - worth
    PackagingType:
      type: string
      enum:
        - box
        - bag
        - membrana
    OrderUpdateAction:
      type: string
      enum:
        - deliver
        - refund
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        recipient_id:
          type: integer
          format: int64
        expiration_date:
          type: string
          format: date-time
        delivered_date:
          type: string
          format: date-time
        refunded_date:
          type: string
          format: date-time
        returned_date:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/OrderStatus"
        history:
          type: array
          items:
            $ref: "#/components/schemas/OrderRecord"
        weight:
          type: number
          format: double
        worth:
          type: number
          format: double
      required:
        - id
        - recipient_id
        - expiration_date
        - history
        - status
        - weight
        - worth
    OrderStatus:
      type: string
      enum:
        - received
        - returned
        - delivered
        - refunded
        - storage_ended
        - none
    OrderRecord:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        description:
          type: string
        status:
          $ref: "#/components/schemas/OrderStatus"
      required:
        - status
        - description
        - timestamp



  
